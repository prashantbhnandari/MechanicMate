<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>User Dashboard | MechanicMate</title>

    <link rel="stylesheet" href="dashboard.css">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>

    <header class="dash-header">
        <h2>MechanicMate</h2>
        <a href="login.html" class="logout-btn">Logout</a>
    </header>

    <!-- MAP -->
    <div id="userMap" style="height:400px; border-radius:20px; margin:30px;"></div>

    <section class="dashboard">
        <h3>Welcome 👋</h3>

        <input type="text" id="locationInput" placeholder="Enter location">

        <div class="services-row">
            <div class="service-card" data-service="Bike Repair">Bike Repair</div>
            <div class="service-card" data-service="Car Repair">Car Repair</div>
            <div class="service-card" data-service="Towing">Towing</div>
        </div>
        
   <button id="findBtn" class="primary-btn">Find Mechanic</button>

        <!-- 🔥 STATUS BOX -->
        <div id="statusBox"></div>


    </section>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- 🔥 SOCKET FIRST -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <!-- THEN JS -->
    <script src="user-dashboard.js"></script>

</body>

</html>
